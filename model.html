<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;700;900&display=swap" rel="stylesheet">
</head>
<body id="js-model-content">

    <div class="sub-nav-wrapper">
        <ul class="sub-nav">
            <li class="active" data-target="sec-main">MAIN</li>
            <li data-target="sec-about">ABOUT</li>
            <li data-target="sec-voice">VOICE</li>
            <li data-target="sec-download">DOWNLOAD</li>
        </ul>
    </div>

    <main>
        <!-- 1. MAIN -->
        <section id="sec-main" class="model-section active" style="display: flex;">
            <div class="hero-img-box"><img id="js-hero-img" src=""></div>
            <div class="hero-text-box">
                <p class="en-title" id="js-title-en"></p>
                <h1 class="main-name" id="js-title-jp"></h1>
            </div>
        </section>

        <!-- 2. ABOUT & VISUALS -->
        <section id="sec-about" class="model-section container">
            <div class="concept-visual">
                <img id="js-about-img" src="">
                <div class="concept-text">
                    <h2 class="section-label">ABOUT</h2>
                    <h3>Who is <span class="purple" id="js-en-name"></span>?</h3>
                    <p class="body-text" id="js-about-text"></p>
                    <div class="info-grid" id="js-profile-grid"></div>
                </div>
            </div>

            <div class="visual-title">
                <h2 class="section-label">VISUALS</h2>
            </div>
            <div class="gallery-grid" id="js-gallery-grid"></div>
        </section>

        <!-- 3. VOICE -->
        <section id="sec-voice" class="model-section container">
            <h2 class="section-label">VOICE PREVIEW</h2>
            <div class="player-wrapper">
                <div class="player-display">
                    <h4 id="track-title">Select a track</h4>
                    <div class="player-ui">
                        <button id="play-pause-btn">PLAY</button>
                        <input type="range" id="seek-bar" value="0">
                    </div>
                    <audio id="audio-element"></audio>
                </div>
                <ul class="playlist" id="js-song-list"></ul>
            </div>
        </section>

        <!-- 4. DOWNLOAD -->
        <section id="sec-download" class="model-section container">
            <div class="dl-box">
                <h2 class="section-label">DOWNLOAD</h2>
                <a id="js-dl-link" href="" class="btn-dl">DOWNLOAD .pth</a>
                
                <div style="margin-top: 60px; text-align: left; opacity: 0.6; font-size: 0.8rem;">
                    <h3 class="section-label">GUIDELINE</h3>
                    <p>・RVC以外の目的での使用禁止</p>
                    <p>・特定の個人・団体を誹謗中傷する目的での使用を禁止します</p>
                </div>
            </div>
        </section>
    </main>

    <script src="data.js"></script>
    <script>
        function initPlayer() {
            const audio = document.getElementById('audio-element');
            const playBtn = document.getElementById('play-pause-btn');
            const seekBar = document.getElementById('seek-bar');
            const trackTitle = document.getElementById('track-title');
            
            const updateTracks = () => {
                const tracks = document.querySelectorAll('.track');
                tracks.forEach(track => {
                    track.onclick = () => {
                        tracks.forEach(t => t.classList.remove('active'));
                        track.classList.add('active');
                        audio.src = track.dataset.src;
                        trackTitle.innerText = track.innerText;
                        audio.play();
                        if(playBtn) playBtn.innerText = 'PAUSE';
                    };
                });
            };
            updateTracks();
            if(playBtn) {
                playBtn.onclick = () => {
                    if (!audio.src) return;
                    if (audio.paused) { audio.play(); playBtn.innerText = 'PAUSE'; }
                    else { audio.pause(); playBtn.innerText = 'PLAY'; }
                };
            }
            if(audio && seekBar) {
                audio.ontimeupdate = () => { seekBar.value = (audio.currentTime / audio.duration) * 100 || 0; };
                seekBar.oninput = () => { audio.currentTime = (seekBar.value / 100) * audio.duration; };
            }
        }
    </script>
    <script src="common.js"></script>
</body>
</html>
